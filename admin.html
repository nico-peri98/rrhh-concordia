<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin - RRHH Concordia</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #fff; }
.header { background: #2c3e50; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
.container { max-width: 1400px; margin: 20px auto; padding: 20px; }
.login-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
.login-box { background: #2c3e50; padding: 40px; border-radius: 10px; width: 100%; max-width: 400px; }
.login-box h2 { margin-bottom: 20px; text-align: center; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; margin-bottom: 8px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 5px; background: #333; color: #fff; font-family: inherit; }
.btn { background: #3498db; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
.btn:hover { background: #2980b9; }
.btn-danger { background: #e74c3c; }
.btn-danger:hover { background: #c0392b; }
.btn-success { background: #27ae60; }
.btn-success:hover { background: #229954; }
.btn-primary { background: #3498db; }
.btn-primary:hover { background: #2980b9; }
.tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid #444; }
.tab { padding: 15px 30px; cursor: pointer; background: transparent; border: none; color: #999; font-size: 16px; }
.tab.active { color: #3498db; border-bottom: 3px solid #3498db; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.card { background: #2c3e50; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
.card h3 { margin-bottom: 15px; }
.filters { background: #2c3e50; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; }
.filters div { flex: 1; min-width: 200px; }
.filters label { display: block; margin-bottom: 8px; font-size: 12px; color: #aaa; }
.filters select { width: 100%; padding: 8px 12px; background: #333; border: 1px solid #444; color: #fff; border-radius: 5px; }
.table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
.table th, .table td { padding: 12px; text-align: left; border-bottom: 1px solid #444; }
.table th { background: #34495e; font-weight: 600; }
.table tr:hover { background: #34495e; }
.score-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-weight: bold; font-size: 11px; }
.score-high { background: #27ae60; color: white; }
.score-medium { background: #f39c12; color: white; }
.score-low { background: #e74c3c; color: white; }
.score-none { background: #555; color: white; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; overflow-y: auto; }
.modal.active { display: flex; }
.modal-content { background: #2c3e50; padding: 30px; border-radius: 10px; width: 90%; max-width: 800px; max-height: 90vh; overflow-y: auto; margin: auto; }
.btn-group { display: flex; gap: 10px; margin-top: 20px; flex-wrap: wrap; }
.hidden { display: none; }
.modal-section { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid #444; }
.modal-section h4 { margin-bottom: 15px; color: #3498db; }
textarea { min-height: 80px; resize: vertical; }
.score-input { width: 100%; padding: 8px; border: 1px solid #444; border-radius: 5px; background: #333; color: #fff; }
.action-buttons { display: flex; gap: 5px; }
</style>
</head>
<body>
<div id="loginScreen" class="login-container">
<div class="login-box">
<h2>Panel de Administracion</h2>
<p style="text-align: center; margin-bottom: 20px; color: #999;">Ingresa tu contrasena</p>
<form id="loginForm">
<div class="form-group">
<label>Contrasena</label>
<input type="password" id="password" required>
</div>
<button type="submit" class="btn" style="width: 100%;">Acceder</button>
</form>
</div>
</div>

<div id="adminPanel" class="hidden">
<div class="header">
<h1>Panel de Administracion</h1>
<button class="btn btn-danger" onclick="logout()">Cerrar sesion</button>
</div>
<div class="container">
<div class="tabs">
<button class="tab active" onclick="cambiarTab('vacantes')">Vacantes</button>
<button class="tab" onclick="cambiarTab('candidatos')">Candidatos</button>
<button class="tab" onclick="cambiarTab('config')">Configuracion</button>
</div>

<div id="tabVacantes" class="tab-content active">
<button class="btn btn-success" onclick="abrirModalVacante()">+ Nueva Vacante</button>
<table class="table">
<thead>
<tr>
<th>Titulo</th>
<th>Ubicacion</th>
<th>Tipo</th>
<th>Rubro</th>
<th>Fecha</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="listaVacantes"></tbody>
</table>
</div>

<div id="tabCandidatos" class="tab-content">
<div class="filters">
<div>
<label>Filtrar por Rubro</label>
<select id="filtroRubro" onchange="cargarCandidatos()">
<option value="">— Todos los rubros —</option>
<option value="Trade Marketing">Trade Marketing</option>
<option value="Operario Polivalente">Operario Polivalente</option>
<option value="Administrativo">Administrativo</option>
<option value="Otro">Otro</option>
</select>
</div>
<div>
<label>Filtrar por Vacante</label>
<select id="filtroVacante" onchange="cargarCandidatos()">
<option value="">— Todas las vacantes —</option>
</select>
</div>
</div>

<table class="table">
<thead>
<tr>
<th>Nombre</th>
<th>Email</th>
<th>Telefono</th>
<th>Rubro</th>
<th>Vacante</th>
<th>Score</th>
<th>Fecha</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="listaCandidatos"></tbody>
</table>
</div>

<div id="tabConfig" class="tab-content">
<div class="card">
<h3>Cambiar Contrasena</h3>
<form id="formPassword">
<div class="form-group">
<label>Nueva contrasena</label>
<input type="password" id="newPassword" required minlength="6">
</div>
<button type="submit" class="btn">Actualizar</button>
</form>
</div>
</div>
</div>
</div>

<div class="modal" id="modalVacante">
<div class="modal-content">
<h2>Nueva Vacante</h2>
<form id="formVacante">
<div class="form-group">
<label>Titulo del puesto</label>
<input type="text" name="titulo" required>
</div>
<div class="form-group">
<label>Ubicacion</label>
<input type="text" name="ubicacion" required>
</div>
<div class="form-group">
<label>Rubro</label>
<select name="rubro" required>
<option value="Trade Marketing">Trade Marketing</option>
<option value="Operario Polivalente">Operario Polivalente</option>
<option value="Administrativo">Administrativo</option>
<option value="Otro">Otro</option>
</select>
</div>
<div class="form-group">
<label>Tipo de contrato</label>
<select name="tipo" required>
<option value="Full-time">Full-time</option>
<option value="Part-time">Part-time</option>
<option value="Contrato">Contrato</option>
<option value="Pasantia">Pasantia</option>
</select>
</div>
<div class="form-group">
<label>Descripcion</label>
<textarea name="descripcion" required rows="5"></textarea>
</div>
<div class="btn-group">
<button type="submit" class="btn btn-success">Publicar</button>
<button type="button" class="btn btn-danger" onclick="cerrarModal('modalVacante')">Cancelar</button>
</div>
</form>
</div>
</div>

<div class="modal" id="modalCandidato">
<div class="modal-content">
<h2 id="modalCandidatoNombre"></h2>
<div id="modalCandidatoBody"></div>
<div class="btn-group">
<button type="button" class="btn btn-danger" onclick="eliminarCandidatoConfirm()">Eliminar</button>
<button type="button" class="btn btn-danger" onclick="cerrarModal('modalCandidato')">Cerrar</button>
</div>
</div>
</div>

<div class="modal" id="modalScoring">
<div class="modal-content">
<h2>Evaluar Candidato</h2>
<div id="modalScoringBody"></div>
<div class="btn-group">
<button type="button" class="btn btn-success" onclick="guardarScoring()">Guardar Evaluacion</button>
<button type="button" class="btn btn-danger" onclick="cerrarModal('modalScoring')">Cancelar</button>
</div>
</div>
</div>

<script>
let candidatoActualId = null;

document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const password = document.getElementById('password').value;
  const res = await fetch('/api/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: 'admin', password })
  });
  if (res.ok) {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('adminPanel').classList.remove('hidden');
    cargarDatos();
  } else {
    alert('Contrasena incorrecta');
  }
});

async function logout() {
  await fetch('/api/logout', { method: 'POST' });
  location.reload();
}

function cambiarTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  const tabName = 'tab' + tab.charAt(0).toUpperCase() + tab.slice(1);
  document.getElementById(tabName).classList.add('active');
}

function abrirModalVacante() {
  document.getElementById('modalVacante').classList.add('active');
}

function cerrarModal(id) {
  document.getElementById(id).classList.remove('active');
}

document.getElementById('formVacante').addEventListener('submit', async (e) => {
  e.preventDefault();
  const formData = new FormData(e.target);
  const data = Object.fromEntries(formData);
  await fetch('/api/vacantes', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  });
  cerrarModal('modalVacante');
  e.target.reset();
  cargarVacantes();
});

document.getElementById('formPassword').addEventListener('submit', async (e) => {
  e.preventDefault();
  const newPassword = document.getElementById('newPassword').value;
  await fetch('/api/change-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ newPassword })
  });
  alert('Contrasena actualizada');
  document.getElementById('newPassword').value = '';
});

async function cargarVacantes() {
  const res = await fetch('/api/vacantes');
  const vacantes = await res.json();
  const tbody = document.getElementById('listaVacantes');
  const select = document.getElementById('filtroVacante');

  tbody.innerHTML = vacantes.map(v => `
    <tr>
      <td>${v.titulo}</td>
      <td>${v.ubicacion}</td>
      <td>${v.tipo}</td>
      <td>${v.rubro || 'N/A'}</td>
      <td>${new Date(v.fecha).toLocaleDateString()}</td>
      <td><button class="btn btn-danger" onclick="eliminarVacante(${v.id})">Eliminar</button></td>
    </tr>
  `).join('');

  select.innerHTML = '<option value="">— Todas las vacantes —</option>' + vacantes.map(v => `<option value="${v.id}">${v.titulo}</option>`).join('');
}

async function eliminarVacante(id) {
  if (!confirm('Eliminar esta vacante?')) return;
  await fetch('/api/vacantes/' + id, { method: 'DELETE' });
  cargarVacantes();
}

async function cargarCandidatos() {
  const filtroRubro = document.getElementById('filtroRubro').value;
  const filtroVacante = document.getElementById('filtroVacante').value;
  const url = new URL('/api/candidatos', window.location.origin);
  if (filtroRubro) url.searchParams.append('rubro', filtroRubro);

  const res = await fetch(url);
  let candidatos = await res.json();

  if (filtroVacante) {
    candidatos = candidatos.filter(c => c.vacanteId == filtroVacante);
  }

  const resVacantes = await fetch('/api/vacantes');
  const vacantes = await resVacantes.json();
  const tbody = document.getElementById('listaCandidatos');

  tbody.innerHTML = candidatos.map(c => {
    const vacante = vacantes.find(v => v.id == c.vacanteId);
    const score = c.scoring ? c.scoring.score : null;
    let scoreBadge = '<span class="score-badge score-none">Sin evaluar</span>';
    if (score !== null) {
      if (score >= 70) {
        scoreBadge = '<span class="score-badge score-high">' + score + '</span>';
      } else if (score >= 50) {
        scoreBadge = '<span class="score-badge score-medium">' + score + '</span>';
      } else {
        scoreBadge = '<span class="score-badge score-low">' + score + '</span>';
      }
    }

    return `
      <tr>
        <td>${c.nombre}</td>
        <td>${c.email}</td>
        <td>${c.telefono}</td>
        <td>${c.rubro || 'N/A'}</td>
        <td>${vacante ? vacante.titulo : 'N/A'}</td>
        <td>${scoreBadge}</td>
        <td>${new Date(c.fecha).toLocaleDateString()}</td>
        <td>
          <div class="action-buttons">
            <button class="btn btn-primary" onclick="abrirDetalleCandidato(${c.id})">Ver</button>
            <button class="btn btn-success" onclick="abrirScoring(${c.id})">Evaluar</button>
            <button class="btn btn-danger" onclick="eliminarCandidatoAPI(${c.id})">Eliminar</button>
          </div>
        </td>
      </tr>
    `;
  }).join('');
}

async function abrirDetalleCandidato(id) {
  const res = await fetch('/api/candidatos');
  const candidatos = await res.json();
  const c = candidatos.find(x => x.id == id);
  candidatoActualId = id;

  let scoringHTML = '';
  if (c.scoring) {
    scoringHTML = `
      <div class="modal-section">
        <h4>Evaluación</h4>
        <p><strong>Score:</strong> ${c.scoring.score}/100</p>
        <p><strong>Fortalezas:</strong></p>
        <p>${c.scoring.fortalezas}</p>
        <p><strong>Debilidades:</strong></p>
        <p>${c.scoring.debilidades}</p>
        <p><strong>Recomendacion:</strong></p>
        <p>${c.scoring.recomendacion}</p>
        <p style="font-size: 12px; color: #999;">Evaluado: ${new Date(c.scoring.fechaEvaluacion).toLocaleString()}</p>
      </div>
    `;
  }

  document.getElementById('modalCandidatoNombre').innerHTML = c.nombre;
  document.getElementById('modalCandidatoBody').innerHTML = `
    <div class="modal-section">
      <h4>Informacion Personal</h4>
      <p><strong>Email:</strong> ${c.email}</p>
      <p><strong>Telefono:</strong> ${c.telefono}</p>
      <p><strong>Rubro:</strong> ${c.rubro || 'N/A'}</p>
      <p><strong>Fecha de postulación:</strong> ${new Date(c.fecha).toLocaleString()}</p>
    </div>
    <div class="modal-section">
      <h4>CV</h4>
      <a href="/${c.cvPath}" target="_blank" class="btn">Descargar CV</a>
    </div>
    ${scoringHTML}
  `;
  document.getElementById('modalCandidato').classList.add('active');
}

async function abrirScoring(id) {
  const res = await fetch('/api/candidatos');
  const candidatos = await res.json();
  const c = candidatos.find(x => x.id == id);
  candidatoActualId = id;

  const scoring = c.scoring || { score: 0, fortalezas: '', debilidades: '', recomendacion: '' };

  document.getElementById('modalScoringBody').innerHTML = `
    <div class="modal-section">
      <h4>${c.nombre}</h4>
      <div class="form-group">
        <label>Score (0-100)</label>
        <input type="number" id="scoringScore" min="0" max="100" value="${scoring.score}" class="score-input">
      </div>
      <div class="form-group">
        <label>Fortalezas</label>
        <textarea id="scoringFortalezas" class="score-input">${scoring.fortalezas}</textarea>
      </div>
      <div class="form-group">
        <label>Debilidades</label>
        <textarea id="scoringDebilidades" class="score-input">${scoring.debilidades}</textarea>
      </div>
      <div class="form-group">
        <label>Recomendacion</label>
        <textarea id="scoringRecomendacion" class="score-input">${scoring.recomendacion}</textarea>
      </div>
    </div>
  `;
  document.getElementById('modalScoring').classList.add('active');
}

async function guardarScoring() {
  const score = document.getElementById('scoringScore').value;
  const fortalezas = document.getElementById('scoringFortalezas').value;
  const debilidades = document.getElementById('scoringDebilidades').value;
  const recomendacion = document.getElementById('scoringRecomendacion').value;

  await fetch(`/api/candidatos/${candidatoActualId}/scoring`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ score, fortalezas, debilidades, recomendacion })
  });

  cerrarModal('modalScoring');
  cargarCandidatos();
  alert('Evaluacion guardada');
}

function eliminarCandidatoConfirm() {
  if (!confirm('Eliminar este candidato?')) return;
  eliminarCandidatoAPI(candidatoActualId);
}

async function eliminarCandidatoAPI(id) {
  await fetch('/api/candidatos/' + id, { method: 'DELETE' });
  cerrarModal('modalCandidato');
  cargarCandidatos();
}

function cargarDatos() {
  cargarVacantes();
  cargarCandidatos();
}
</script>
</body>
</html>
