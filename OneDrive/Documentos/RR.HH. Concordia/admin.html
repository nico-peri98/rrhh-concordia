<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin - RRHH Concordia</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a1a; color: #fff; }
.header { background: #2c3e50; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
.container { max-width: 1400px; margin: 20px auto; padding: 20px; }
.login-container { display: flex; justify-content: center; align-items: center; height: 100vh; }
.login-box { background: #2c3e50; padding: 40px; border-radius: 10px; width: 100%; max-width: 400px; }
.login-box h2 { margin-bottom: 20px; text-align: center; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; margin-bottom: 8px; }
.form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; border: 1px solid #444; border-radius: 5px; background: #333; color: #fff; }
.btn { background: #3498db; color: white; padding: 12px 24px; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; }
.btn:hover { background: #2980b9; }
.btn-danger { background: #e74c3c; }
.btn-danger:hover { background: #c0392b; }
.btn-success { background: #27ae60; }
.btn-success:hover { background: #229954; }
.tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid #444; }
.tab { padding: 15px 30px; cursor: pointer; background: transparent; border: none; color: #999; font-size: 16px; }
.tab.active { color: #3498db; border-bottom: 3px solid #3498db; }
.tab-content { display: none; }
.tab-content.active { display: block; }
.card { background: #2c3e50; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
.card h3 { margin-bottom: 15px; }
.table { width: 100%; border-collapse: collapse; margin-top: 20px; }
.table th, .table td { padding: 12px; text-align: left; border-bottom: 1px solid #444; }
.table th { background: #34495e; }
.table tr:hover { background: #34495e; }
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
.modal.active { display: flex; }
.modal-content { background: #2c3e50; padding: 30px; border-radius: 10px; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; }
.btn-group { display: flex; gap: 10px; }
.hidden { display: none; }
</style>
</head>
<body>
<div id="loginScreen" class="login-container">
<div class="login-box">
<h2>Panel de Administracion</h2>
<p style="text-align: center; margin-bottom: 20px; color: #999;">Ingresa tu contrasena</p>
<form id="loginForm">
<div class="form-group">
<label>Contrasena</label>
<input type="password" id="password" required>
</div>
<button type="submit" class="btn" style="width: 100%;">Acceder</button>
</form>
</div>
</div>

<div id="adminPanel" class="hidden">
<div class="header">
<h1>Panel de Administracion</h1>
<button class="btn btn-danger" onclick="logout()">Cerrar sesion</button>
</div>
<div class="container">
<div class="tabs">
<button class="tab active" onclick="cambiarTab('vacantes')">Vacantes</button>
<button class="tab" onclick="cambiarTab('candidatos')">Candidatos</button>
<button class="tab" onclick="cambiarTab('config')">Configuracion</button>
</div>

<div id="tabVacantes" class="tab-content active">
<button class="btn btn-success" onclick="abrirModalVacante()">+ Nueva Vacante</button>
<table class="table">
<thead>
<tr>
<th>Titulo</th>
<th>Ubicacion</th>
<th>Tipo</th>
<th>Fecha</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="listaVacantes"></tbody>
</table>
</div>

<div id="tabCandidatos" class="tab-content">
<table class="table">
<thead>
<tr>
<th>Nombre</th>
<th>Email</th>
<th>Telefono</th>
<th>Vacante</th>
<th>Fecha</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="listaCandidatos"></tbody>
</table>
</div>

<div id="tabConfig" class="tab-content">
<div class="card">
<h3>Cambiar Contrasena</h3>
<form id="formPassword">
<div class="form-group">
<label>Nueva contrasena</label>
<input type="password" id="newPassword" required minlength="6">
</div>
<button type="submit" class="btn">Actualizar</button>
</form>
</div>
</div>
</div>
</div>

<div class="modal" id="modalVacante">
<div class="modal-content">
<h2>Nueva Vacante</h2>
<form id="formVacante">
<div class="form-group">
<label>Titulo del puesto</label>
<input type="text" name="titulo" required>
</div>
<div class="form-group">
<label>Ubicacion</label>
<input type="text" name="ubicacion" required>
</div>
<div class="form-group">
<label>Tipo de contrato</label>
<select name="tipo" required>
<option value="Full-time">Full-time</option>
<option value="Part-time">Part-time</option>
<option value="Contrato">Contrato</option>
<option value="Pasantia">Pasantia</option>
</select>
</div>
<div class="form-group">
<label>Descripcion del puesto</label>
<textarea name="descripcion" rows="4" placeholder="Breve descripcion general del puesto..."></textarea>
</div>
<div class="form-group">
<label>Responsabilidades (una por linea)</label>
<textarea name="responsabilidades" rows="4" placeholder="Ej: Atender clientes&#10;Gestionar stock&#10;Reportar a gerencia"></textarea>
</div>
<div class="form-group">
<label>Requisitos (uno por linea)</label>
<textarea name="requisitos" rows="4" placeholder="Ej: Secundario completo&#10;Experiencia en ventas&#10;Disponibilidad full-time"></textarea>
</div>
<div class="form-group">
<label>Se valora (opcional, uno por linea)</label>
<textarea name="se_valora" rows="3" placeholder="Ej: Manejo de Excel&#10;Experiencia en retail"></textarea>
</div>
<div class="form-group">
<label>Beneficios (opcional, uno por linea)</label>
<textarea name="beneficios" rows="3" placeholder="Ej: Obra social&#10;Bonos por desempeno&#10;Comidas en planta"></textarea>
</div>
<div class="btn-group">
<button type="submit" class="btn btn-success">Publicar</button>
<button type="button" class="btn btn-danger" onclick="cerrarModal('modalVacante')">Cancelar</button>
</div>
</form>
</div>
</div>

<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
e.preventDefault();
const password = document.getElementById('password').value;
const res = await fetch('/api/login', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ username: 'admin', password })
});
if (res.ok) {
document.getElementById('loginScreen').classList.add('hidden');
document.getElementById('adminPanel').classList.remove('hidden');
cargarDatos();
} else {
alert('Contrasena incorrecta');
}
});

async function logout() {
await fetch('/api/logout', { method: 'POST' });
location.reload();
}

function cambiarTab(tab) {
document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
event.target.classList.add('active');
document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
}

function abrirModalVacante() {
document.getElementById('modalVacante').classList.add('active');
}

function cerrarModal(id) {
document.getElementById(id).classList.remove('active');
}

document.getElementById('formVacante').addEventListener('submit', async (e) => {
e.preventDefault();
const formData = new FormData(e.target);
const data = Object.fromEntries(formData);
await fetch('/api/vacantes', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify(data)
});
cerrarModal('modalVacante');
e.target.reset();
cargarVacantes();
});

document.getElementById('formPassword').addEventListener('submit', async (e) => {
e.preventDefault();
const newPassword = document.getElementById('newPassword').value;
await fetch('/api/change-password', {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({ newPassword })
});
alert('Contrasena actualizada');
document.getElementById('newPassword').value = '';
});

async function cargarVacantes() {
const res = await fetch('/api/vacantes');
const vacantes = await res.json();
const tbody = document.getElementById('listaVacantes');
tbody.innerHTML = vacantes.map(v => `
<tr>
<td>${v.titulo}</td>
<td>${v.ubicacion}</td>
<td>${v.tipo}</td>
<td>${new Date(v.fecha).toLocaleDateString()}</td>
<td><button class="btn btn-danger" onclick="eliminarVacante(${v.id})">Eliminar</button></td>
</tr>
`).join('');
}

async function eliminarVacante(id) {
if (!confirm('Eliminar esta vacante?')) return;
await fetch('/api/vacantes/' + id, { method: 'DELETE' });
cargarVacantes();
}

async function cargarCandidatos() {
const res = await fetch('/api/candidatos');
const candidatos = await res.json();
const resVacantes = await fetch('/api/vacantes');
const vacantes = await resVacantes.json();
const tbody = document.getElementById('listaCandidatos');
tbody.innerHTML = candidatos.map(c => {
return `
<tr>
<td>${c.nombre}</td>
<td>${c.email}</td>
<td>${c.telefono || '-'}</td>
<td>${c.vacante_titulo || 'Espontánea'}</td>
<td>${new Date(c.fecha).toLocaleDateString('es-AR')}</td>
<td>
<a href="${c.cv_url}" target="_blank" class="btn btn-success" title="${c.cv_original || 'Ver CV'}">⬇ CV</a>
<button class="btn btn-danger" onclick="eliminarCandidato(${c.id})">Eliminar</button>
</td>
</tr>
`;
}).join('');
}

async function eliminarCandidato(id) {
if (!confirm('Eliminar este candidato?')) return;
await fetch('/api/candidatos/' + id, { method: 'DELETE' });
cargarCandidatos();
}

function cargarDatos() {
cargarVacantes();
cargarCandidatos();
}
</script>
</body>
</html>
